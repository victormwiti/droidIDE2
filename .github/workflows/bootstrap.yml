name: Bootstrap DroidIDE

# ─────────────────────────────────────────────────────────────────────────────
# DROIDIDE BOOTSTRAP
# Upload ONLY this file to a new empty GitHub repo as:
#   .github/workflows/bootstrap.yml
#
# Then go to Actions → Bootstrap DroidIDE → Run workflow
# This workflow will recreate the entire project from embedded base64 data,
# commit it to your repo, then build the APK — all in one run.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Build APK immediately after bootstrap?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  bootstrap:
    name: Unpack & Commit Project Files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write project files from embedded base64
        run: |
          set -e

          write_file() {
            local path="$1"
            local b64="$2"
            mkdir -p "$(dirname "$path")"
            echo "$b64" | base64 -d > "$path"
            echo "  ✅ $path"
          }

          echo "Extracting DroidIDE project files..."

          write_file 'README.md' \
            ''

          write_file 'pubspec.yaml' \
            ''

          write_file '.github/workflows/build.yml' \
            ''

          write_file 'android/build.gradle' \
            ''

          write_file 'android/gradle.properties' \
            'b3JnLmdyYWRsZS5qdm1hcmdzPS1YbXg0RyAtWFg6TWF4TWV0YXNwYWNlU2l6ZT0yRyAtWFg6K0hlYXBEdW1wT25PdXRPZk1lbW9yeUVycm9yCmFuZHJvaWQudXNlQW5kcm9pZFg9dHJ1ZQphbmRyb2lkLmVuYWJsZUpldGlmaWVyPXRydWUK'

          write_file 'android/settings.gradle' \
            ''

          write_file 'android/app/build.gradle' \
            ''

          write_file 'android/app/src/main/AndroidManifest.xml' \
            ''

          write_file 'android/app/src/main/kotlin/com/droidide/app/MainActivity.kt' \
            'cGFja2FnZSBjb20uZHJvaWRpZGUuYXBwCgppbXBvcnQgaW8uZmx1dHRlci5lbWJlZGRpbmcuYW5kcm9pZC5GbHV0dGVyQWN0aXZpdHkKCmNsYXNzIE1haW5BY3Rpdml0eSA6IEZsdXR0ZXJBY3Rpdml0eSgpCg=='

          write_file 'android/app/src/main/res/xml/file_paths.xml' \
            'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHBhdGhzPgogICAgPGZpbGVzLXBhdGggbmFtZT0iaW50ZXJuYWxfZmlsZXMiIHBhdGg9Ii4iIC8+CiAgICA8Y2FjaGUtcGF0aCBuYW1lPSJjYWNoZV9maWxlcyIgcGF0aD0iLiIgLz4KICAgIDxleHRlcm5hbC1maWxlcy1wYXRoIG5hbWU9ImV4dGVybmFsX2ZpbGVzIiBwYXRoPSIuIiAvPgo8L3BhdGhzPgo='

          write_file 'docs/INSTRUCTIONS.md' \
            ''

          write_file 'docs/PROGRESS.md' \
            ''

          write_file 'docs/RECOMMENDATIONS.md' \
            ''

          write_file 'docs/SETUP_GUIDE.md' \
            ''

          write_file 'docs/TECHNICAL.md' \
            ''

          write_file 'lib/main.dart' \
            ''

          write_file 'lib/models/project.dart' \
            ''

          write_file 'lib/screens/editor_screen.dart' \
            ''

          write_file 'lib/screens/home_screen.dart' \
            ''

          write_file 'lib/screens/splash_screen.dart' \
            ''

          write_file 'lib/services/github_service.dart' \
            ''

          write_file 'lib/services/project_service.dart' \
            ''

          write_file 'lib/services/terminal_service.dart' \
            ''

          write_file 'lib/theme/app_theme.dart' \
            ''

          write_file 'lib/widgets/ci_panel.dart' \
            ''

          write_file 'lib/widgets/code_editor_panel.dart' \
            ''

          write_file 'lib/widgets/editor_tabs.dart' \
            ''

          write_file 'lib/widgets/file_tree_panel.dart' \
            ''

          write_file 'lib/widgets/github_auth_sheet.dart' \
            ''

          write_file 'lib/widgets/new_project_dialog.dart' \
            ''

          write_file 'lib/widgets/terminal_panel.dart' \
            ''

          echo "All files written."

      - name: Configure git
        run: |
          git config user.name  'DroidIDE Bootstrap'
          git config user.email 'bootstrap@droidide.app'

      - name: Commit and push all project files
        run: |
          git add -A
          git diff --cached --quiet && echo 'Nothing to commit' && exit 0
          git commit -m 'chore: bootstrap DroidIDE project via workflow'
          git push

  build:
    name: Build Flutter APK
    needs: bootstrap
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_apk == 'true' }}

    steps:
      - name: Checkout (post-bootstrap)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release --no-shrink
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: droidide-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: droidide-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
        continue-on-error: true
